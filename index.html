function useReveal(delay = 0) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        setTimeout(() => el.classList.add('vis'), delay);
        obs.disconnect();
      }
    }, { threshold: 0.12 });
    obs.observe(el);
    return () => obs.disconnect();
  }, [delay]);
  return ref;
}

function useScrolled() {
  const [s, setS] = useState(false);
  useEffect(() => {
    const fn = () => setS(window.scrollY > 48);
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return s;
}

function Contact({ dark }) {
  const ref = useReveal();
  const tc = dark ? 'text-white' : 'text-[#0a0a0a]';
  const sub = dark ? 'text-white/55' : 'text-black/50';
  const bg = dark ? 'bg-[#0a0a0a]' : 'bg-[#f7f7f2]';
  const fieldBorder = dark ? 'border-white/15 text-white placeholder:text-white/25' : 'border-black/15 text-[#0a0a0a] placeholder:text-black/30';
  const fieldFocus = dark ? 'focus:border-[#e8ff47]' : 'focus:border-[#0a0a0a]';

  const [form, setForm] = useState({ name:'', email:'', subject:'', message:'', budget:'' });
  const [errors, setErrors] = useState({});
  const [status, setStatus] = useState('idle'); // idle | loading | success | error
  const [touched, setTouched] = useState({});

  const validators = {
    name: v => !v.trim() ? 'Name is required.' : v.trim().length < 2 ? 'Name must be at least 2 characters.' : '',
    email: v => !v.trim() ? 'Email is required.' : !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) ? 'Please enter a valid email address.' : '',
    subject: v => !v.trim() ? 'Subject is required.' : '',
    message: v => !v.trim() ? 'Message is required.' : v.trim().length < 20 ? 'Message must be at least 20 characters.' : v.trim().length > 1000 ? 'Message must be under 1000 characters.' : '',
  };

  const validate = (fields = form) => {
    const errs = {};
    Object.keys(validators).forEach(k => { const e = validators[k](fields[k]); if (e) errs[k] = e; });
    return errs;
  };

  const handleChange = (k, v) => {
    const next = { ...form, [k]: v };
    setForm(next);
    if (touched[k]) {
      const errs = validate(next);
      setErrors(prev => ({ ...prev, [k]: errs[k] || '' }));
    }
  };

  const handleBlur = k => {
    setTouched(prev => ({ ...prev, [k]: true }));
    const errs = validate();
    setErrors(prev => ({ ...prev, [k]: errs[k] || '' }));
  };

  const handleSubmit = async e => {
    e.preventDefault();
    const allTouched = Object.keys(validators).reduce((a,k) => ({...a,[k]:true}),{});
    setTouched(allTouched);
    const errs = validate();
    setErrors(errs);
    if (Object.keys(errs).length) return;

    setStatus('loading');

    try {
      await emailjs.send(
        "service_kekde3v",
        "template_8ck11od",
        {
          name: form.name,
          email: form.email,
          subject: form.subject,
          message: form.message,
          budget: form.budget
        }
      );

      setStatus('success');
      setForm({ name:'', email:'', subject:'', message:'', budget:'' });
      setTouched({});
      setTimeout(() => setStatus('idle'), 5000);

    } catch (error) {
      console.error(error);
      setStatus('error');
    }
  };

  const inputClass = k => `field ${fieldBorder} ${fieldFocus} ${errors[k] && touched[k] ? 'border-red-400' : ''}`;

  return (
    <section id="contact" className={`py-28 ${bg}`}>
      <div className="max-w-5xl mx-auto px-6">
        <div className="reveal" ref={ref}>
          <span className="tag">Contact</span>
          <h2 className={`syne text-4xl md:text-5xl font-bold mt-4 ${tc}`}>
            Let's build something<br/>
            <span style={{color:'var(--a)'}}>extraordinary.</span>
          </h2>
          <p className={`mt-4 max-w-xl ${sub}`}>
            Open to freelance projects, full-time roles, and technical consulting. I typically respond within 24 hours.
          </p>
        </div>

        <div className="mt-14 grid md:grid-cols-5 gap-12">
          {/* Left — info */}
          <div className="md:col-span-2 flex flex-col gap-7 reveal" ref={useReveal(100)}>
            {[
              { icon:'📧', label:'Email', val:'khondokarwaysalemustafa@gmail.com', href:'mailto:khondokarwaysalemustafa@gmail.com' },
              { icon:'💼', label:'LinkedIn', val:'/in/waysal-mustafa', href:'https://linkedin.com/in/khondokar-waysal-e-mustafa-802297210/?skipRedirect=true' },
              { icon:'🐙', label:'GitHub', val:'@waysal-mustafa', href:'https://github.com/waysal1' },
              { icon:'🏫', label:'University', val:'BRAC University · CSE · Year 3', href:'https://www.bracu.ac.bd' },
            ].map(({ icon, label, val, href }) => (
              <a key={label} href={href} target="_blank" rel="noreferrer"
                className={`flex items-center gap-3 no-underline group ${tc}`}>
                <span className="text-2xl">{icon}</span>
                <div>
                  <p className={`text-xs uppercase tracking-widest font-bold ${dark?'text-white/35':'text-black/30'}`}>{label}</p>
                  <p className="text-sm font-medium group-hover:underline" style={{textDecorationColor:'var(--a)'}}>{val}</p>
                </div>
              </a>
            ))}

            <div className={`mt-4 rounded-2xl p-5 border ${dark?'bg-white/4 border-white/8':'bg-white border-black/7'}`}>
              <p className="text-xs uppercase tracking-widest font-bold mb-2" style={{color:'var(--a)'}}>Currently Available</p>
              <p className={`text-sm ${sub}`}>Open to internships, part-time roles, full-time roles, and freelance projects. Happy to collaborate on interesting problems — let's connect!</p>
            </div>
          </div>

          {/* Right — form */}
          <div className="md:col-span-3 reveal" ref={useReveal(180)}>
            {status === 'success' ? (
              <div className="toast flex flex-col items-center justify-center text-center py-16 gap-4">
                <span className="text-6xl">🎉</span>
                <h3 className={`syne text-2xl font-bold ${tc}`}>Message sent!</h3>
                <p className={sub}>Thanks for reaching out, Waysal will get back to you soon!</p>
                <button className="btn btn-y mt-2" onClick={() => setStatus('idle')}>Send another →</button>
              </div>
            ) : (
              <form onSubmit={handleSubmit} noValidate className="flex flex-col gap-7">
                <div className="grid md:grid-cols-2 gap-7">
                  {/* Name */}
                  <div>
                    <label className={`block text-xs uppercase tracking-widest font-bold mb-1.5 ${dark?'text-white/40':'text-black/35'}`}>
                      Full Name <span style={{color:'var(--a)'}}>*</span>
                    </label>
                    <input className={inputClass('name')} value={form.name} placeholder="XYZ Smith"
                      onChange={e => handleChange('name', e.target.value)}
                      onBlur={() => handleBlur('name')} />
                    {errors.name && touched.name && <p className="err-msg">{errors.name}</p>}
                  </div>
                  {/* Email */}
                  <div>
                    <label className={`block text-xs uppercase tracking-widest font-bold mb-1.5 ${dark?'text-white/40':'text-black/35'}`}>
                      Email Address <span style={{color:'var(--a)'}}>*</span>
                    </label>
                    <input type="email" className={inputClass('email')} value={form.email} placeholder="xyz@company.com"
                      onChange={e => handleChange('email', e.target.value)}
                      onBlur={() => handleBlur('email')} />
                    {errors.email && touched.email && <p className="err-msg">{errors.email}</p>}
                  </div>
                </div>

                <div className="grid md:grid-cols-2 gap-7">
                  {/* Subject */}
                  <div>
                    <label className={`block text-xs uppercase tracking-widest font-bold mb-1.5 ${dark?'text-white/40':'text-black/35'}`}>
                      Subject <span style={{color:'var(--a)'}}>*</span>
                    </label>
                    <input className={inputClass('subject')} value={form.subject} placeholder="Project inquiry"
                      onChange={e => handleChange('subject', e.target.value)}
                      onBlur={() => handleBlur('subject')} />
                    {errors.subject && touched.subject && <p className="err-msg">{errors.subject}</p>}
                  </div>
                  {/* Position */}
                  <div>
                    <label className={`block text-xs uppercase tracking-widest font-bold mb-1.5 ${dark?'text-white/40':'text-black/35'}`}>
                      Budget Range <span className={`normal-case font-normal ${sub}`}>(optional)</span>
                    </label>
                    <select className={`field ${fieldBorder} ${fieldFocus} bg-transparent`} value={form.budget}
                      onChange={e => handleChange('budget', e.target.value)}
                      style={{background:'transparent'}}>
                      <option value="" className={dark?'bg-[#141414]':'bg-white'}>Select range…</option>
                      {['Internship','Part-time role','Full-time role'].map(o => (
                        <option key={o} value={o} className={dark?'bg-[#141414]':'bg-white'}>{o}</option>
                      ))}
                    </select>
                  </div>
                </div>

                {/* Message */}
                <div>
                  <label className={`block text-xs uppercase tracking-widest font-bold mb-1.5 ${dark?'text-white/40':'text-black/35'}`}>
                    Message <span style={{color:'var(--a)'}}>*</span>
                  </label>
                  <textarea className={inputClass('message')} rows={5} value={form.message}
                    placeholder="Tell me about your project, timeline, and any technical constraints…"
                    onChange={e => handleChange('message', e.target.value)}
                    onBlur={() => handleBlur('message')}
                    style={{resize:'vertical'}} />
                  <div className="flex justify-between mt-1">
                    {errors.message && touched.message ? <p className="err-msg">{errors.message}</p> : <span />}
                    <span className={`text-xs ${form.message.length > 900 ? 'text-red-400' : sub}`}>{form.message.length}/1000</span>
                  </div>
                </div>

                <div className="flex items-center gap-4 flex-wrap">
                  <button type="submit" className="btn btn-y" disabled={status==='loading'}
                    style={{opacity: status==='loading'?.7:1, cursor: status==='loading'?'wait':'pointer'}}>
                    {status === 'loading' ? (
                      <span className="flex items-center gap-2">
                        <span className="inline-block w-4 h-4 border-2 border-black/30 border-t-black rounded-full" style={{animation:'spin .6s linear infinite'}} />
                        Sending…
                      </span>
                    ) : 'Send Message →'}
                  </button>
                  <p className={`text-xs ${sub}`}>
                    Or email directly at <a href="mailto:khondokarwaysalemustafa@gmail.com" style={{color:'var(--a)'}}>khondokarwaysalemustafa@gmail.com</a>
                  </p>
                </div>

                {status === 'error' && (
                  <p className="text-red-400 text-sm">Something went wrong. Please try again.</p>
                )}
              </form>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}

function downloadCV() {
  const byteChars = atob(CV_PDF_B64);
  const byteNums = new Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) byteNums[i] = byteChars.charCodeAt(i);
  const blob = new Blob([new Uint8Array(byteNums)], {type:'application/pdf'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'Waysal_Mustafa_CV.pdf'; a.click();
  URL.revokeObjectURL(url);
}

function App() {
  const [dark, setDark] = useState(true);
  const [guideOpen, setGuideOpen] = useState(false);

  return (
    <div>
      <Navbar dark={dark} setDark={setDark} />
      <Hero dark={dark} />
      <About dark={dark} />
      <Projects dark={dark} />
      <Skills dark={dark} />
      <Contact dark={dark} />
      <Footer dark={dark} openGuide={() => setGuideOpen(true)} />
      {guideOpen && <GuideModal dark={dark} onClose={() => setGuideOpen(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
